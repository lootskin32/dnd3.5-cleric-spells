<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DnD 3.5 Cleric Spell Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    /* ── Consolidated D&D Warm Theme ── */
    :root {
      --bg-dark:       #04050d;
      --bg-panel:      #080b18;
      --bg-card:       #0d1120;
      --bg-card-hover: #141a2e;
      --bg-prepared:   #071410;
      --gold:          #c8a84b;
      --gold-light:    #e8c870;
      --gold-dim:      #7a6428;
      --gold-faint:    #161208;
      --ice:           #c8a030;
      --ice-light:     #e8c060;
      --ice-dim:       #50380e;
      --ice-faint:     #130e04;
      --purple:        #3a1e68;
      --purple-dark:   #0e0818;
      --text-primary:  #ddd0b0;
      --text-secondary:#907848;
      --text-muted:    #3c3018;
      --border-dark:   #1c1810;
      --border-gold:   #3a2e10;
      --red:           #8b1c1c;
      --red-light:     #d04040;
      --green:         #1a6e3a;
      --green-light:   #3ace6a;
      --slot-full:     #6e1c1c;
      --slot-done:     #083a20;
      --bevel-hi:      rgba(220,180,80,0.2);
      --bevel-lo:      rgba(0,0,0,0.65);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:      radial-gradient(ellipse 200% 100% at 50% 0%, #12081e 0%, #04030a 100%);
      color:           var(--text-primary);
      font-family:     'Crimson Text', Georgia, serif;
      font-size:       20px;
      display:         flex;
      flex-direction:  column;
      height:          100vh;
      overflow:        hidden;
    }

    /* ── HEADER ── */
    header {
      background:      linear-gradient(180deg, #06040c 0%, #120828 55%, #08040e 100%);
      border-bottom:   2px solid var(--gold-dim);
      box-shadow:      inset 0 1px 0 rgba(220,180,80,0.14), 0 0 0 1px #020108, 0 4px 20px rgba(0,0,0,0.95);
      padding:         12px 20px;
      display:         flex;
      align-items:     center;
      gap:             14px;
      flex-shrink:     0;
      z-index:         100;
    }

    header h1 {
      font-family:     'Cinzel', serif;
      font-size:       20px;
      font-weight:     600;
      color:           var(--gold-light);
      letter-spacing:  0.5px;
      white-space:     nowrap;
    }

/* Day navigation */
    .day-nav {
      display:     flex;
      align-items: center;
      gap:         6px;
      flex-shrink: 0;
    }

    .day-nav-btn {
      background:    linear-gradient(180deg, #1c1610 0%, #120e08 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--gold);
      cursor:        pointer;
      padding:       5px 14px;
      border-radius: 3px;
      font-size:     19px;
      line-height:   1.4;
      box-shadow:    inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo), 0 2px 4px rgba(0,0,0,0.55);
      transition:    background 0.1s;
    }
    .day-nav-btn:hover:not(:disabled) {
      background: linear-gradient(180deg, #281e12 0%, #1c160a 100%);
      color:      var(--gold-light);
      box-shadow: inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo),
                  0 0 12px rgba(200,160,50,0.38), 0 3px 6px rgba(0,0,0,0.7);
    }
    .day-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .day-nav-delete { margin-left: 8px; border-color: var(--red); color: var(--red-light); }
    .day-nav-delete:hover:not(:disabled) { background: var(--red); color: var(--text-primary); }

    #dayLabel {
      font-family: 'Cinzel', serif;
      font-size:   18px;
      color:       var(--gold-light);
      text-shadow: 0 0 10px rgba(220,180,60,0.5);
      min-width:   124px;
      text-align:  center;
      white-space: nowrap;
    }

    /* File dropdown */
    .file-wrap { position: relative; flex-shrink: 0; }

    #fileMenuBtn {
      max-width:     180px;
      overflow:      hidden;
      text-overflow: ellipsis;
      white-space:   nowrap;
    }

    .file-menu {
      display:       none;
      position:      absolute;
      top:           calc(100% + 4px);
      left:          0;
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border:        1px solid var(--gold-dim);
      border-radius: 5px;
      min-width:     220px;
      z-index:       200;
      overflow:      hidden;
      box-shadow:    0 0 0 1px rgba(0,0,0,0.9), 0 10px 32px rgba(0,0,0,0.95), inset 0 1px 0 var(--bevel-hi);
    }
    .file-menu.open { display: block; }

    .file-menu-item {
      padding:     12px 18px;
      cursor:      pointer;
      font-size:   18px;
      color:       var(--text-primary);
      display:     flex;
      justify-content: space-between;
      align-items: center;
      gap:         12px;
    }
    .file-menu-item:hover { background: linear-gradient(180deg, #201608 0%, #180e04 100%); }
.file-menu-sep {
      border:     none;
      border-top: 1px solid var(--border-dark);
      margin:     3px 0;
    }
    .header-right { display: flex; align-items: center; gap: 6px; margin-left: auto; }

    /* Generic buttons */
    .btn {
      background:    linear-gradient(180deg, #1c1610 0%, #120e08 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--gold);
      cursor:        pointer;
      font-family:   'Cinzel', serif;
      font-size:     15px;
      padding:       8px 16px;
      border-radius: 4px;
      white-space:   nowrap;
      box-shadow:    inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo), 0 2px 5px rgba(0,0,0,0.55);
      transition:    background 0.12s, color 0.12s;
    }
    .btn:hover {
      background: linear-gradient(180deg, #281e12 0%, #1c160a 100%);
      color:      var(--gold-light);
      box-shadow: inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo),
                  0 0 16px rgba(200,160,50,0.42), 0 0 32px rgba(180,130,30,0.2),
                  0 4px 10px rgba(0,0,0,0.8);
    }
    .btn:active {
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.75);
    }

    .btn-primary {
      background:   linear-gradient(180deg, #2a2010 0%, #1a1408 100%);
      border-color: var(--gold-dim);
      color:        var(--gold-light);
      box-shadow:   inset 0 1px 0 rgba(220,180,80,0.25), inset 0 -1px 0 var(--bevel-lo), 0 2px 5px rgba(0,0,0,0.55);
    }
    .btn-primary:hover {
      background: linear-gradient(180deg, #382c14 0%, #221808 100%);
      color:      var(--gold-light);
      box-shadow: inset 0 1px 0 rgba(220,180,80,0.25), inset 0 -1px 0 var(--bevel-lo),
                  0 0 14px rgba(200,168,75,0.45), 0 0 28px rgba(150,120,50,0.2),
                  0 4px 10px rgba(0,0,0,0.75);
    }

    .btn-danger { border-color: var(--red); color: var(--red-light); }
    .btn-danger:hover { background: var(--slot-full); color: var(--red-light); }

    /* ── PAST DAY BANNER ── */
    .past-day-banner {
      display:       none;
      background:    linear-gradient(180deg, #120820 0%, #0a0614 100%);
      border-bottom: 1px solid #4a2878;
      padding:       8px 20px;
      font-size:     16px;
      color:         #9070c0;
      text-align:    center;
      letter-spacing: 0.4px;
      flex-shrink:   0;
      box-shadow:    0 2px 14px rgba(80,40,140,0.4);
    }
    .past-day-banner.visible { display: block; }

    /* ── SETTINGS OVERLAY ── */
    .overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(0,0,0,0.75);
      z-index:         300;
      align-items:     center;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .settings-box {
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border:        1px solid var(--gold-dim);
      border-radius: 8px;
      padding:       24px;
      width:         360px;
      max-height:    85vh;
      overflow-y:    auto;
      box-shadow:    inset 0 1px 0 var(--bevel-hi),
                     0 0 0 3px rgba(0,0,0,0.92),
                     0 0 0 4px rgba(80,50,10,0.3),
                     0 30px 80px rgba(0,0,0,0.98);
    }
    .settings-box h2 {
      font-family:   'Cinzel', serif;
      color:         var(--gold-light);
      text-shadow:   0 0 12px rgba(200,168,75,0.4);
      font-size:     21px;
      margin-bottom: 4px;
    }
    .settings-note {
      font-size:     17px;
      color:         var(--text-muted);
      margin-bottom: 16px;
      line-height:   1.4;
    }
    .slot-row {
      display:         flex;
      justify-content: space-between;
      align-items:     center;
      padding:         8px 0;
      border-bottom:   1px solid var(--border-dark);
      font-size:       18px;
      color:           var(--text-secondary);
    }
    .slot-row input {
      width:         70px;
      background:    linear-gradient(180deg, #080402 0%, #0c0804 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--text-primary);
      border-radius: 3px;
      padding:       4px 8px;
      text-align:    center;
      font-family:   'Crimson Text', serif;
      font-size:     18px;
      box-shadow:    inset 0 2px 5px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(0,0,0,0.2);
    }
    .settings-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
    .settings-divider { border: none; border-top: 1px solid var(--border-dark); margin: 16px 0 12px; }
    .settings-box h3 {
      font-family:   'Cinzel', serif;
      color:         var(--gold-light);
      text-shadow:   0 0 12px rgba(200,168,75,0.4);
      font-size:     17px;
      margin-bottom: 10px;
    }

    /* ── MODAL (spell + new day) ── */
    .modal-overlay {
      display:         none;
      position:        fixed;
      inset:           0;
      background:      rgba(0,0,0,0.75);
      z-index:         300;
      align-items:     center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border:        1px solid var(--gold-dim);
      border-radius: 8px;
      padding:       24px;
      width:         420px;
      max-width:     92vw;
      box-shadow:    inset 0 1px 0 var(--bevel-hi),
                     0 0 0 3px rgba(0,0,0,0.92),
                     0 0 0 4px rgba(80,50,10,0.3),
                     0 30px 80px rgba(0,0,0,0.98);
    }
    .modal-box h2 {
      font-family:   'Cinzel', serif;
      color:         var(--gold-light);
      text-shadow:   0 0 12px rgba(200,168,75,0.4);
      font-size:     20px;
      margin-bottom: 16px;
    }
    .modal-field { margin-bottom: 14px; }
    .modal-field label {
      display:        block;
      font-size:      15px;
      color:          var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom:  5px;
    }
    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      width:         100%;
      background:    linear-gradient(180deg, #080402 0%, #0c0804 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--text-primary);
      border-radius: 4px;
      padding:       9px 12px;
      font-family:   'Crimson Text', serif;
      font-size:     19px;
      box-shadow:    inset 0 2px 5px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(0,0,0,0.2);
    }
    .modal-field textarea { height: 80px; resize: vertical; }
    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus { outline: none; border-color: var(--gold-dim); }
    .modal-field select option { background: var(--bg-card); }
    .modal-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }

    /* New-day option buttons */
    .newday-options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .newday-option {
      background:    linear-gradient(180deg, #18120e 0%, #0e0a06 100%);
      border:        1px solid #2e2010;
      border-radius: 6px;
      padding:       16px 20px;
      cursor:        pointer;
      text-align:    left;
      color:         var(--text-primary);
      font-family:   'Crimson Text', serif;
      font-size:     19px;
      box-shadow:    inset 0 1px 0 rgba(200,180,100,0.08), 0 2px 4px rgba(0,0,0,0.45);
      transition:    border-color 0.12s, background 0.12s;
    }
    .newday-option:hover {
      background:   linear-gradient(180deg, #221a10 0%, #18120a 100%);
      border-color: var(--gold-dim);
      box-shadow:   inset 0 1px 0 rgba(220,180,80,0.1), 0 0 10px rgba(180,140,40,0.2),
                    0 3px 10px rgba(0,0,0,0.65);
    }
    .newday-option strong {
      display:     block;
      color:       var(--gold);
      text-shadow: 0 0 5px rgba(200,168,75,0.2);
      margin-bottom: 2px;
      font-size:   18px;
    }

    /* ── MAIN LAYOUT ── */
    .main {
      display:  flex;
      flex:     1;
      overflow: hidden;
    }

    /* ── LEFT PANEL ── */
    .panel-left {
      width:       52%;
      display:     flex;
      flex-direction: column;
      overflow:    hidden;
      min-width:   180px;
    }

    /* ── DIVIDER ── */
    .divider {
      width:       6px;
      flex-shrink: 0;
      background:  linear-gradient(180deg, transparent 0%, #1e1810 10%, #1e1810 90%, transparent 100%);
      cursor:      col-resize;
      transition:  background 0.15s;
      position:    relative;
    }
    .divider:hover, .divider.dragging {
      background: linear-gradient(180deg, transparent 0%, var(--gold-dim) 10%, var(--gold-dim) 90%, transparent 100%);
    }
    .divider::after {
      content:    '';
      position:   absolute;
      inset:      0 -4px;
    }

    .panel-bar {
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border-bottom: 1px solid var(--gold-dim);
      padding:       12px 16px;
      display:       flex;
      align-items:   center;
      gap:           10px;
      flex-shrink:   0;
      box-shadow:    inset 0 1px 0 rgba(160,200,244,0.06), 0 2px 10px rgba(0,0,0,0.6);
    }
    .panel-title {
      font-family:    'Cinzel', serif;
      font-size:      16px;
      color:          var(--gold-dim);
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow:    0 0 6px rgba(200,168,75,0.2);
      flex-shrink:    0;
    }

    .search-input {
      flex:          1;
      background:    linear-gradient(180deg, #080402 0%, #0c0804 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--text-primary);
      border-radius: 4px;
      padding:       7px 12px;
      font-family:   'Crimson Text', serif;
      font-size:     18px;
      min-width:     0;
      box-shadow:    inset 0 2px 5px rgba(0,0,0,0.65), inset 0 0 0 1px rgba(0,0,0,0.2);
    }
    .search-input:focus { outline: none; border-color: var(--gold-dim); }

    .btn-add-global {
      background:    linear-gradient(180deg, #201808 0%, #160e04 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--gold);
      cursor:        pointer;
      font-family:   'Cinzel', serif;
      font-size:     14px;
      padding:       7px 12px;
      border-radius: 4px;
      white-space:   nowrap;
      flex-shrink:   0;
      box-shadow:    inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo), 0 2px 4px rgba(0,0,0,0.5);
    }
    .btn-add-global:hover {
      background: linear-gradient(180deg, #2a2412 0%, #1a180a 100%);
      color:      var(--gold-light);
      box-shadow: inset 0 1px 0 rgba(220,180,80,0.2), inset 0 -1px 0 var(--bevel-lo),
                  0 0 10px rgba(200,168,75,0.35), 0 3px 6px rgba(0,0,0,0.65);
    }

    .spells-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }

    /* Level sections */
    .level-section { margin-bottom: 4px; }

    .level-header {
      display:       flex;
      align-items:   center;
      padding:       12px 16px;
      cursor:        pointer;
      user-select:   none;
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border-top:    1px solid var(--gold-dim);
      border-bottom: 1px solid #020100;
      gap:           10px;
      box-shadow:    inset 0 1px 0 rgba(200,168,75,0.07), 0 1px 4px rgba(0,0,0,0.4);
    }
    .level-header:hover { background: linear-gradient(180deg, #201608 0%, #160e04 100%); }

    .level-name {
      font-family: 'Cinzel', serif;
      font-size:   17px;
      color:       var(--gold-light);
      text-shadow: 0 0 10px rgba(220,180,60,0.3);
      flex:        1;
    }
    .slot-counter {
      font-size:     16px;
      color:         var(--text-muted);
      border:        1px solid transparent;
      border-radius: 10px;
      padding:       3px 12px;
      transition:    color 0.2s, border-color 0.2s;
    }
    .slot-counter.has-prepared {
      color:        var(--gold-light);
      border-color: var(--gold-dim);
      text-shadow:  0 0 8px rgba(220,180,60,0.6);
    }
    .slot-counter.slot-full {
      color:        var(--red-light);
      border-color: var(--red);
      text-shadow:  0 0 8px rgba(208,64,64,0.6);
    }
    .slot-counter.slot-complete {
      color:        var(--green-light);
      border-color: var(--green);
      text-shadow:  0 0 8px rgba(58,206,106,0.6);
    }

    .caret {
      font-size:  15px;
      color:      var(--text-muted);
      transition: transform 0.2s;
    }
    .level-section.collapsed .caret { transform: rotate(-90deg); }
    .level-section.collapsed .spells-grid,
    .level-section.collapsed .add-spell-row { display: none; }

    .spells-grid {
      display:               grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap:                   10px;
      padding:               12px 14px;
    }

    /* Spell cards */
    .spell-card {
      background:    linear-gradient(165deg, #18120e 0%, #0e0a06 100%);
      border:        2px solid var(--gold-dim);
      border-radius: 6px;
      padding:       12px 14px 10px;
      cursor:        pointer;
      position:      relative;
      min-height:    95px;
      overflow:      hidden;
      box-shadow:    inset 0 1px 0 rgba(200,180,100,0.07), 0 2px 6px rgba(0,0,0,0.5);
      transition:    transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      contain:       content;
    }
    .spell-card:hover {
      background:   linear-gradient(165deg, #221a10 0%, #18120a 100%);
      border-color: var(--gold);
      box-shadow:   inset 0 1px 0 rgba(220,180,80,0.1), 0 0 14px rgba(180,140,40,0.22),
                    0 4px 14px rgba(0,0,0,0.7);
    }
    .spell-card.is-prepared {
      background:  linear-gradient(165deg, #0c1e12 0%, #06120a 100%);
      border-color: var(--green);
      box-shadow:  inset 0 0 20px rgba(76,174,76,0.08), 0 0 0 1px var(--green), 0 2px 6px rgba(0,0,0,0.5);
    }
    .spell-card.slot-full-card        { cursor: not-allowed; opacity: 0.5; }
    .spell-card.slot-full-card:hover {
      background:   linear-gradient(165deg, #18120e 0%, #0e0a06 100%);
      border-color: var(--gold-dim);
      box-shadow:   inset 0 1px 0 rgba(200,180,100,0.07), 0 2px 6px rgba(0,0,0,0.5);
      transform:    none;
    }

    .spell-card-name {
      font-family:   'Cinzel', serif;
      font-size:     16px;
      color:         var(--gold-light);
      text-shadow:   0 0 8px rgba(220,180,60,0.22);
      margin-bottom: 4px;
      padding-right: 50px;
    }
    .spell-card-desc {
      font-size:   15px;
      color:       var(--text-secondary);
      line-height: 1.35;
    }

    /* Card action buttons (edit / delete) */
    .card-actions {
      position: absolute;
      top:      5px;
      right:    5px;
      display:  none;
      gap:      2px;
    }
    .spell-card:hover .card-actions { display: flex; }

    .btn-card-action {
      background:      linear-gradient(180deg, #141008 0%, #0c0804 100%);
      border:          1px solid var(--border-dark);
      color:           var(--text-muted);
      cursor:          pointer;
      width:           26px;
      height:          26px;
      border-radius:   3px;
      font-size:       15px;
      display:         flex;
      align-items:     center;
      justify-content: center;
      line-height:     1;
      padding:         0;
      box-shadow:      inset 0 1px 0 rgba(200,180,100,0.12), 0 1px 3px rgba(0,0,0,0.5);
    }
    .btn-card-action:hover          { color: var(--text-primary); border-color: var(--gold-dim); }
    .btn-card-delete:hover          { color: var(--red-light);   border-color: var(--red); }

    /* Card badges */
    .card-badges {
      display:     flex;
      gap:         5px;
      margin-top:  5px;
      align-items: center;
    }
    .badge-fav {
      font-size:   18px;
      color:       var(--text-muted);
      cursor:      pointer;
      line-height: 1;
      transition:  color 0.15s;
    }
    .badge-fav:hover  { color: var(--gold); }
    .badge-fav.fav-active { color: var(--gold-light); }
    .badge-count {
      background:    var(--green);
      color:         #c0f0c0;
      border-radius: 8px;
      font-size:     14px;
      padding:       1px 8px;
      font-family:   'Cinzel', serif;
      box-shadow:    0 0 5px rgba(76,174,76,0.5);
    }
    .btn-badge-remove {
      background:    rgba(100,20,20,0.5);
      border:        1px solid var(--red);
      color:         var(--red-light);
      cursor:        pointer;
      border-radius: 6px;
      font-size:     12px;
      padding:       1px 6px;
      line-height:   1;
      transition:    background 0.12s, color 0.12s;
    }
    .btn-badge-remove:hover { background: var(--red); color: #ffa0a0; }

    /* Add spell row */
    .add-spell-row {
      padding: 4px 10px 8px;
    }
    .btn-add-spell {
      width:         100%;
      background:    none;
      border:        1px dashed var(--gold-dim);
      border-radius: 5px;
      color:         var(--gold-dim);
      cursor:        pointer;
      font-family:   'Crimson Text', serif;
      font-size:     17px;
      padding:       9px;
      text-align:    center;
      box-shadow:    inset 0 0 12px rgba(200,168,75,0.03);
      transition:    color 0.15s, border-color 0.15s, background 0.15s;
    }
    .btn-add-spell:hover { color: var(--gold); border-color: var(--gold-dim); background: var(--gold-faint); }

    /* ── RIGHT PANEL ── */
    .panel-right {
      flex:     1;
      display:  flex;
      flex-direction: column;
      overflow: hidden;
    }

    .prep-scroll {
      flex:       1;
      overflow-y: auto;
      padding:    14px 18px;
      background: linear-gradient(180deg, #080604 0%, #030202 100%);
    }

    .prep-level-block { margin-bottom: 14px; }

    .prep-level-header {
      display:       flex;
      align-items:   center;
      gap:           8px;
      margin-bottom: 5px;
    }
    .prep-level-name {
      font-family:    'Cinzel', serif;
      font-size:      16px;
      color:          var(--gold-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      text-shadow:    0 0 5px rgba(200,168,75,0.15);
      flex:           1;
    }
    .prep-slot-badge {
      font-size:     15px;
      color:         var(--text-muted);
      border:        1px solid transparent;
      border-radius: 8px;
      padding:       3px 10px;
    }
    .prep-slot-badge.complete {
      color:        var(--green-light);
      border-color: var(--green);
      text-shadow:  0 0 5px rgba(76,174,76,0.4);
    }
    .prep-slot-badge.full {
      color:        var(--red-light);
      border-color: var(--red);
      text-shadow:  0 0 5px rgba(208,64,64,0.4);
    }

    .prep-item {
      display:       flex;
      align-items:   center;
      gap:           8px;
      padding:       10px 14px;
      background:    linear-gradient(180deg, #140e08 0%, #0e0a06 100%);
      border:        1px solid #2e2010;
      border-radius: 5px;
      margin-bottom: 5px;
      box-shadow:    inset 0 1px 0 rgba(200,180,100,0.05), 0 1px 4px rgba(0,0,0,0.45);
      transition:    transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, opacity 0.15s;
      contain:       content;
    }
    .prep-item.is-used { opacity: 0.45; }
    .prep-item:not(.is-used):not(.read-only):hover {
      transform:    translateY(-2px) scale(1.01);
      border-color: var(--gold-dim);
      box-shadow:   0 0 0 1px var(--gold-dim), inset 0 0 14px rgba(200,160,50,0.07),
                    0 6px 18px rgba(0,0,0,0.65);
    }

    .prep-item-name {
      flex:      1;
      font-size: 19px;
      color:     var(--text-primary);
    }
    .prep-item.is-used .prep-item-name { text-decoration: line-through; color: var(--text-muted); }

    .prep-item.read-only .prep-item-controls { display: none; }
    .prep-item-status {
      display:   none;
      font-size: 18px;
      color:     var(--text-muted);
    }
    .prep-item.read-only .prep-item-status { display: block; }
    .prep-item.read-only.is-used .prep-item-status { color: var(--green-light); }

    .prep-item-controls { display: flex; gap: 4px; flex-shrink: 0; }

    .btn-micro {
      background:    linear-gradient(180deg, #160e08 0%, #100a04 100%);
      border:        1px solid var(--gold-dim);
      color:         var(--gold);
      cursor:        pointer;
      border-radius: 3px;
      padding:       5px 10px;
      font-size:     15px;
      transition:    background 0.12s, color 0.12s;
      box-shadow:    inset 0 1px 0 rgba(200,180,100,0.08), 0 1px 3px rgba(0,0,0,0.45);
    }
    .btn-micro:hover  { background: linear-gradient(180deg, #201608 0%, #180e04 100%); color: var(--gold-light); }
    .btn-micro.active {
      background:   var(--slot-done);
      border-color: var(--green);
      color:        var(--green-light);
      box-shadow:   inset 0 2px 4px rgba(0,0,0,0.55), 0 0 8px rgba(58,206,106,0.35);
    }
    .use-btn.active:hover { background: var(--green); }

    .empty-msg {
      text-align:  center;
      color:       var(--text-muted);
      font-size:   19px;
      padding:     32px 16px;
      line-height: 1.6;
    }

    /* Scrollbar — Chrome/Edge + Firefox */
    * {
      scrollbar-width: thin;
      scrollbar-color: #4a3410 #030202;
    }
    ::-webkit-scrollbar       { width: 7px; }
    ::-webkit-scrollbar-track { background: #030202; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #2a1e06, #4a3410, #2a1e06); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #4a3410, #6a4c18, #4a3410); }

    /* ══════════════════════════════════════════════════════════
       ANIMATIONS & PARTICLE EFFECTS
       ══════════════════════════════════════════════════════════ */

    @keyframes btn-shimmer {
      0%   { left: -80%; }
      100% { left: 160%; }
    }
    @keyframes card-shimmer {
      0%   { left: -100%; }
      100% { left: 210%; }
    }
    @keyframes pulse-prepared {
      0%, 100% { box-shadow: inset 0 0 20px rgba(76,174,76,0.08), 0 0 0 1px var(--green), 0 2px 6px rgba(0,0,0,0.5); }
      50%       { box-shadow: inset 0 0 32px rgba(76,174,76,0.22), 0 0 0 1px #5cce5c, 0 0 18px rgba(76,174,76,0.32), 0 4px 10px rgba(0,0,0,0.55); }
    }
    @keyframes title-glow {
      0%, 100% { text-shadow: 0 0 16px rgba(200,168,75,0.55), 0 1px 2px #000; }
      50%       { text-shadow: 0 0 32px rgba(200,168,75,1), 0 0 64px rgba(200,168,75,0.35), 0 1px 2px #000; }
    }
    @keyframes rune-spin {
      0%   { transform: rotate(0deg);   opacity: 0.35; }
      50%  { transform: rotate(180deg); opacity: 0.7; }
      100% { transform: rotate(360deg); opacity: 0.35; }
    }

    /* ── HEADER TITLE: slow gold pulse ── */
    header h1 { animation: title-glow 6s ease-in-out infinite; }

    /* ── BUTTONS: shimmer on hover ── */
    .btn, .day-nav-btn, .btn-add-global { position: relative; overflow: hidden; }
    .btn::after, .day-nav-btn::after, .btn-add-global::after {
      content:        '';
      position:       absolute;
      top:            -10%;
      left:           -80%;
      width:          55%;
      height:         120%;
      background:     linear-gradient(105deg, transparent 20%, rgba(255,218,112,0.28) 50%, transparent 80%);
      transform:      skewX(-15deg);
      pointer-events: none;
      z-index:        2;
    }
    .btn:hover::after,
    .day-nav-btn:hover:not(:disabled)::after,
    .btn-add-global:hover::after { animation: btn-shimmer 0.55s ease-out forwards; }

    .btn-primary::after { background: linear-gradient(105deg, transparent 20%, rgba(255,230,130,0.4) 50%, transparent 80%); }

    /* ── SPELL CARDS: lift + shimmer + rune + pulse ── */
    /* Shimmer sweep (::before) */
    .spell-card::before {
      content:        '';
      position:       absolute;
      top:            0;
      left:           -100%;
      width:          55%;
      height:         100%;
      background:     linear-gradient(90deg, transparent, rgba(255,220,140,0.08), transparent);
      transform:      skewX(-8deg);
      pointer-events: none;
      z-index:        1;
    }
    /* Corner rune (::after) */
    .spell-card::after {
      content:        '\2726';
      position:       absolute;
      bottom:         5px;
      right:          8px;
      font-size:      11px;
      color:          rgba(120,90,30,0.3);
      pointer-events: none;
      z-index:        1;
      transition:     color 0.3s, transform 0.4s;
      display:        block;
      line-height:    1;
    }
    .spell-card:not(.is-prepared):not(.slot-full-card):hover { transform: translateY(-4px); }
    .spell-card:not(.is-prepared):not(.slot-full-card):hover::before { animation: card-shimmer 0.65s ease-out forwards; }
    .spell-card:hover::after { color: rgba(200,168,75,0.65); transform: rotate(45deg); }

    .spell-card.is-prepared           { animation: pulse-prepared 3.5s ease-in-out infinite; will-change: box-shadow; }
    .spell-card.is-prepared::after    { color: rgba(76,174,76,0.55); }
    .spell-card.is-prepared:hover::after { animation: rune-spin 1.2s linear infinite; }

    .spell-card[data-level] { border: 2px solid var(--gold-dim); }

    /* ══════════════════════════════════════════════════════════
       BUTTON CLICK ANIMATIONS
       ══════════════════════════════════════════════════════════ */

    @keyframes click-burst {
      0%   { outline: 0px solid rgba(220,180,75,0.9); outline-offset: 0;    opacity: 0.7; }
      25%  { opacity: 1; }
      100% { outline: 10px solid rgba(220,180,75,0);  outline-offset: 10px; opacity: 1; }
    }
    @keyframes click-burst-gold {
      0%   { outline: 0px solid rgba(220,180,75,0.9); outline-offset: 0;    opacity: 0.7; }
      25%  { opacity: 1; }
      100% { outline: 10px solid rgba(220,180,75,0);  outline-offset: 10px; opacity: 1; }
    }
    @keyframes click-burst-red {
      0%   { outline: 0px solid rgba(208,64,64,0.9); outline-offset: 0;    opacity: 0.75; }
      25%  { opacity: 1; }
      100% { outline: 10px solid rgba(208,64,64,0);  outline-offset: 10px; opacity: 1; }
    }
    .click-burst                       { animation: click-burst      0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .btn-primary.click-burst           { animation: click-burst-gold 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .btn-danger.click-burst            { animation: click-burst-red  0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .day-nav-delete.click-burst        { animation: click-burst-red  0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }

    /* Active/press: scale down */
    .btn:active, .day-nav-btn:active, .btn-add-global:active, .btn-micro:active {
      transform: scale(0.96) translateY(1px);
    }

    /* ══════════════════════════════════════════════════════════
       SPELL TOOLTIP
       ══════════════════════════════════════════════════════════ */

    .spell-tooltip {
      position:       fixed;
      background:     linear-gradient(180deg, #160e08 0%, #0e0804 100%);
      border:         1px solid var(--gold-dim);
      border-radius:  6px;
      padding:        14px 18px;
      max-width:      300px;
      min-width:      200px;
      z-index:        250;
      pointer-events: none;
      opacity:        0;
      box-shadow:     0 0 0 3px rgba(0,0,0,0.92),
                      0 0 0 4px rgba(80,50,10,0.25),
                      inset 0 1px 0 rgba(220,180,80,0.12),
                      0 12px 40px rgba(0,0,0,0.95);
    }
    .spell-tooltip.visible { opacity: 1; }
    .tooltip-desc {
      font-size:   16px;
      color:       var(--text-secondary);
      line-height: 1.5;
    }

    /* ── SPELL CARD ANIMATIONS ── */

    @keyframes card-flip-in {
      0%   { transform: perspective(500px) rotateY(180deg); opacity: 0.5; }
      45%  { transform: perspective(500px) rotateY(90deg);  opacity: 1;   }
      100% { transform: perspective(500px) rotateY(0deg);   opacity: 1;   }
    }
    @keyframes card-flip-out {
      0%   { transform: perspective(500px) rotateY(-180deg); opacity: 0.5; }
      45%  { transform: perspective(500px) rotateY(-90deg);  opacity: 1;   }
      100% { transform: perspective(500px) rotateY(0deg);    opacity: 1;   }
    }
    @keyframes card-bounce {
      0%   { transform: translateY(0);     }
      35%  { transform: translateY(-10px); }
      65%  { transform: translateY(3px);   }
      100% { transform: translateY(0);     }
    }

    .spell-card.anim-flip-in  { animation: card-flip-in  0.6s ease-out forwards; }
    .spell-card.anim-flip-out { animation: card-flip-out 0.6s ease-out forwards; }
    .spell-card.anim-bounce   { animation: card-bounce   0.35s ease-out forwards; }

    /* ── PAUSE ANIMATIONS WHEN TAB IS HIDDEN ── */
    .page-hidden *, .page-hidden *::before, .page-hidden *::after {
      animation-play-state: paused !important;
    }

    /* ── FAVORITES FILTER ACTIVE STATE ── */
    .btn-fav-filter.fav-active {
      color:        var(--gold-light);
      border-color: var(--gold);
      box-shadow:   inset 0 1px 0 var(--bevel-hi), inset 0 -1px 0 var(--bevel-lo),
                    0 0 10px rgba(200,168,75,0.4), 0 2px 4px rgba(0,0,0,0.5);
    }

    /* ── SEARCH MATCH HIGHLIGHT ── */
    .search-hl {
      background:    rgba(200,168,75,0.22);
      color:         var(--gold-light);
      border-radius: 2px;
      padding:       0 1px;
    }

    /* ── MOBILE RESPONSIVE ── */
    @media (max-width: 768px) {
      .main {
        flex-direction: column;
        overflow-y:     auto;
        overflow-x:     hidden;
      }
      .panel-left,
      .panel-right {
        width:       100% !important;
        min-width:   0;
        height:      50vh;
        flex-shrink: 0;
      }
      .divider { display: none; }

      header {
        flex-wrap: wrap;
        padding:   8px 12px;
        gap:       8px;
      }
      header h1 {
        font-size: 15px;
        animation: none;
      }
      .day-nav-btn  { padding: 4px 10px; font-size: 16px; }
      #dayLabel     { font-size: 14px; min-width: 70px; }
      .header-right { gap: 4px; }
      .btn          { font-size: 13px; padding: 6px 10px; }

      .panel-bar    { flex-wrap: wrap; gap: 6px; padding: 8px 10px; }
      .search-input { font-size: 16px; }

      .spells-grid {
        grid-template-columns: 1fr;
        gap:     8px;
        padding: 8px 10px;
      }
      .prep-scroll { padding: 10px 12px; }

      .settings-box { width: 92vw; }
      .modal-box    { width: 92vw; }
    }
  </style>
</head>
<body>

<!-- Spell tooltip (shown on prepared-list hover) -->
<div id="spellTooltip" class="spell-tooltip">
  <div class="tooltip-desc"></div>
</div>

<!-- ═══ HEADER ═══════════════════════════════════════════════ -->
<header>
  <h1>&#9876; DnD 3.5 Cleric Spell Manager</h1>

  <!-- Day navigation -->
  <div class="day-nav">
    <button class="day-nav-btn" id="btnPrevDay" onclick="prevDay()" title="Previous day">&#9664;</button>
    <span id="dayLabel">Day 1</span>
    <button class="day-nav-btn" id="btnNextDay" onclick="nextDay()" title="Next day">&#9654;</button>
    <button class="day-nav-btn" id="btnToday" onclick="goToToday()" title="Jump to today" style="display:none">Today</button>
    <button class="day-nav-btn day-nav-delete" id="btnDeleteDay" onclick="deleteDay()" title="Remove this day">&#10005;</button>
  </div>

  <div class="header-right">
    <!-- File dropdown -->
    <div class="file-wrap" id="fileWrap">
      <button class="btn" id="fileMenuBtn" onclick="toggleFileMenu()">&#128190; <span id="fileStatus">Unsaved</span> &#9662;</button>
      <div class="file-menu" id="fileMenu">
        <div class="file-menu-item" onclick="saveFile()">Export JSON&#8230;</div>
        <div class="file-menu-item" onclick="openFile()">Import JSON&#8230;</div>
      </div>
    </div>

    <button class="btn" onclick="openSettings()">&#9881; Settings</button>
    <button class="btn btn-danger" onclick="promptNewDay()">&#9790; New Day</button>
  </div>
</header>

<!-- Past-day read-only banner -->
<div class="past-day-banner" id="pastDayBanner"></div>

<!-- ═══ SETTINGS OVERLAY ══════════════════════════════════════ -->
<div class="overlay" id="overlay" onclick="onOverlayClick(event)">
  <div class="settings-box">
    <h2>&#9881; Spell Slot Configuration</h2>
    <p class="settings-note">Set your prepared spell slots per level, including bonus spells from your Wisdom modifier and domain slots.</p>
    <div id="slotForm"></div>
    <div class="settings-actions">
      <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      <button class="btn"             onclick="closeSettings()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ SPELL MODAL (add / edit) ════════════════════════════ -->
<div class="modal-overlay" id="spellModal" onclick="onSpellModalBg(event)">
  <div class="modal-box">
    <h2 id="spellModalTitle">Add Spell</h2>
    <div class="modal-field">
      <label>Level</label>
      <select id="modalLevel">
        <option value="0">Level 0 &mdash; Orisons</option>
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
        <option value="4">Level 4</option>
        <option value="5">Level 5</option>
        <option value="6">Level 6</option>
        <option value="7">Level 7</option>
        <option value="8">Level 8</option>
        <option value="9">Level 9</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Name</label>
      <input type="text" id="modalName" placeholder="Spell name&hellip;" onkeydown="onSpellModalKey(event)">
    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="modalDesc" placeholder="Spell description&hellip;" onkeydown="onSpellModalKey(event)"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn"         onclick="closeSpellModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveSpell()">Save Spell</button>
    </div>
  </div>
</div>

<!-- ═══ NEW DAY MODAL ════════════════════════════════════════ -->
<div class="modal-overlay" id="newDayModal" onclick="onNewDayModalBg(event)">
  <div class="modal-box">
    <h2>&#9790; New Day</h2>
    <div class="newday-options">
      <button class="newday-option" onclick="startNewDay('clean')">
        <strong>Clean Slate</strong>
        Start fresh with no prepared spells.
      </button>
      <button class="newday-option" onclick="startNewDay('copy')">
        <strong>Copy Today&rsquo;s Spells</strong>
        Keep the same spell list, all marked as uncast.
      </button>
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeNewDayModal()">Cancel</button>
    </div>
  </div>
</div>

<!-- ═══ MAIN ══════════════════════════════════════════════════ -->
<div class="main">

  <!-- Left: spell browser -->
  <div class="panel-left">
    <div class="panel-bar">
      <span class="panel-title">Available Spells</span>
      <button class="btn-add-global" onclick="openAddSpell(-1)" title="Add a spell at any level">+ Add Spell</button>
      <button class="btn-add-global btn-fav-filter" id="favFilterBtn" onclick="toggleFavFilter()" title="Show favorites only">&#9733;</button>
      <div style="position:relative; flex:1; min-width:0;">
        <input class="search-input" id="searchInput" type="text" placeholder="Search&hellip;" oninput="onSearchInput()" style="width:100%; padding-right:28px;">
        <button id="searchClearBtn" onclick="clearSearch()" title="Clear search"
                style="display:none; position:absolute; right:6px; top:50%; transform:translateY(-50%);
                       background:none; border:none; color:var(--text-secondary); cursor:pointer;
                       font-size:16px; line-height:1; padding:0;">&#10005;</button>
      </div>
    </div>
    <div class="spells-scroll" id="leftPanel"></div>
  </div>

  <div class="divider" id="divider"></div>

  <!-- Right: prepared spells -->
  <div class="panel-right">
    <div class="panel-bar">
      <span class="panel-title" id="rightPanelTitle">Today&rsquo;s Prepared Spells</span>
      <span id="prepSummary" style="font-size:15px; color:var(--text-muted); margin-left:auto; flex-shrink:0;"></span>
    </div>
    <div class="prep-scroll" id="rightPanel"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════
// DEFAULT SPELL DATA
// ═══════════════════════════════════════════════════════════════

const DEFAULT_SPELLS = [
  // Level 0
  { id:0,  level:0, name:"Create Water",          desc:"Creates 2 gallons/level of pure water." },
  { id:1,  level:0, name:"Cure Minor Wounds",     desc:"Cures 1 point of damage." },
  { id:2,  level:0, name:"Detect Magic",          desc:"Detects spells and magic items within 60 ft." },
  { id:3,  level:0, name:"Detect Poison",         desc:"Detects poison in one creature or object." },
  { id:4,  level:0, name:"Guidance",              desc:"+1 on one attack roll, saving throw, or skill check." },
  { id:5,  level:0, name:"Inflict Minor Wounds",  desc:"Touch attack, 1 point of damage." },
  { id:6,  level:0, name:"Light",                 desc:"Object shines like a torch." },
  { id:7,  level:0, name:"Mending",               desc:"Makes minor repairs on an object." },
  { id:8,  level:0, name:"Purify Food and Drink", desc:"Purifies 1 cu. ft./level of food or water." },
  { id:9,  level:0, name:"Read Magic",            desc:"Read scrolls and spellbooks." },
  { id:10, level:0, name:"Resistance",            desc:"Subject gains +1 on saving throws." },
  { id:11, level:0, name:"Virtue",                desc:"Subject gains 1 temporary hp." },
  { id:219, level:0, name:"Clean",               desc:"Cleans grime and dirt from one object or person. (RR)" },
  { id:220, level:0, name:"Quick Sober",         desc:"Cures the target of alcoholic influences. (RR)" },
  { id:221, level:0, name:"Shockwave",           desc:"Knock a foe prone from a distance by punching the ground. (RR)" },

// Which spell is being edited (null = adding new)
let spellModalEditId = null;

// O(1) spell lookup map — rebuilt whenever state.spells changes
let spellMap = new Map();
function rebuildSpellMap() {
  spellMap = new Map(state.spells.map(s => [s.id, s]));
}

function uid() {
  return crypto.randomUUID();
}
function today()       { return new Date().toISOString().slice(0, 10); }
function findSpell(id) { return spellMap.get(id); }
function viewingDay()  { return state.days[state.currentDayIndex]; }
function currentDay()  { return state.days[state.days.length - 1]; }
function isViewingCurrent() { return state.currentDayIndex === state.days.length - 1; }
function nextSpellId() {
  return state.spells.reduce((max, s) => Math.max(max, s.id), -1) + 1;
}

// ═══════════════════════════════════════════════════════════════
// SERIALIZATION
// ═══════════════════════════════════════════════════════════════

function serializeState() {
  return {
    version:   1,
    slots:     state.slots,
    spells:    state.spells,
    favorites: [...state.favorites],
    collapsed: [...state.collapsed],
    days:      state.days,
  };
}

function restoreState(data) {
  if (!data || typeof data !== 'object') return;

  if (data.slots && typeof data.slots === 'object') {
    const clean = {};
    for (let i = 0; i <= 9; i++) {
      const v = Number(data.slots[i]);
      clean[i] = (Number.isFinite(v) && v >= 0) ? Math.floor(v) : 0;
    }
    state.slots = clean;
  }

  if (Array.isArray(data.spells)) {
    state.spells = data.spells.filter(s =>
      s && typeof s === 'object' &&
      typeof s.id === 'number' && Number.isFinite(s.id) &&
      typeof s.level === 'number' && s.level >= 0 && s.level <= 9 &&
      typeof s.name === 'string'
    ).map(s => ({
      id:    s.id,
      level: s.level,
      name:  String(s.name).slice(0, 200),
      desc:  String(s.desc || '').slice(0, 1000),
    }));
    rebuildSpellMap();
  }

  if (Array.isArray(data.favorites)) {
    state.favorites = new Set(data.favorites.filter(f => typeof f === 'number'));
  }
  if (Array.isArray(data.collapsed)) {
    state.collapsed = new Set(data.collapsed.filter(c => typeof c === 'number'));
  }

  if (Array.isArray(data.days) && data.days.length) {
    state.days = data.days.filter(d =>
      d && typeof d === 'object' && Array.isArray(d.prepared)
    ).map(d => ({
      id:       d.id,
      label:    String(d.label || ''),
      date:     String(d.date || ''),
      prepared: d.prepared.filter(p =>
        p && typeof p === 'object' && typeof p.spellId === 'number'
      ).map(p => ({
        spellId: p.spellId,
        used:    !!p.used,
        iid:     typeof p.iid === 'string' ? p.iid : uid(),
      })),
    }));
  }

  if (state.days.length === 0) {
    state.days = [{ id: 1, label: 'Day 1', date: today(), prepared: [] }];
  }
  state.currentDayIndex = state.days.length - 1;
}

function initFreshState() {
  state.spells = DEFAULT_SPELLS.map(s => ({ ...s }));
  rebuildSpellMap();
  state.days   = [{ id: 1, label: 'Day 1', date: today(), prepared: [] }];
  state.currentDayIndex = 0;
}

// ═══════════════════════════════════════════════════════════════
// FILE OPERATIONS
// ═══════════════════════════════════════════════════════════════

let autoSaveTimer = 0;
function autoSave() {
  markUnsaved();
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    try {
      localStorage.setItem('dnd-cleric-state', JSON.stringify(serializeState()));
    } catch(e) {}
    updateFileStatus();
  }, 400);
}

function saveFile() {
  closeFileMenu();
  const json = JSON.stringify(serializeState(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'cleric-spells-' + today() + '.json';
  a.click();
  URL.revokeObjectURL(url);
}

function openFile() {
  closeFileMenu();
  const input = document.createElement('input');
  input.type  = 'file';
  input.accept = '.json,application/json';
  input.addEventListener('change', async () => {
    const file = input.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      restoreState(JSON.parse(text));
      autoSave();
      render();
    } catch(e) {
      alert('Could not load file: ' + e.message);
    }
  });
  input.click();
}

function updateFileStatus() {
  document.getElementById('fileStatus').textContent = 'Saved';
  document.getElementById('fileMenuBtn').style.color = '';
}

function markUnsaved() {
  document.getElementById('fileStatus').textContent = 'Unsaved';
  document.getElementById('fileMenuBtn').style.color = 'var(--gold-light)';
}

// File menu dropdown
function toggleFileMenu() {
  document.getElementById('fileMenu').classList.toggle('open');
}
function closeFileMenu() {
  document.getElementById('fileMenu').classList.remove('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('fileWrap');
  if (wrap && !wrap.contains(e.target)) closeFileMenu();
});

// ═══════════════════════════════════════════════════════════════
// DAY NAVIGATION
// ═══════════════════════════════════════════════════════════════

function prevDay() {
  if (state.currentDayIndex > 0) { state.currentDayIndex--; render(); }
}
function nextDay() {
  if (state.currentDayIndex < state.days.length - 1) { state.currentDayIndex++; render(); }
}
function goToToday() {
  state.currentDayIndex = state.days.length - 1;
  render();
}
function deleteDay() {
  if (state.days.length <= 1) return;
  const day = state.days[state.currentDayIndex];
  if (!confirm('Remove "' + day.label + '"? This cannot be undone.')) return;
  state.days.splice(state.currentDayIndex, 1);
  if (state.currentDayIndex >= state.days.length) state.currentDayIndex = state.days.length - 1;
  state.days.forEach((d, i) => { d.id = i + 1; d.label = 'Day ' + (i + 1); });
  autoSave();
  render();
}

function updateDayNav() {
  const vd  = viewingDay();
  const tot = state.days.length;
  document.getElementById('dayLabel').textContent    = vd.label + ' / ' + tot;
  document.getElementById('btnPrevDay').disabled     = state.currentDayIndex === 0;
  document.getElementById('btnNextDay').disabled     = state.currentDayIndex === tot - 1;
  document.getElementById('btnDeleteDay').disabled   = tot <= 1;
  document.getElementById('btnToday').style.display  = isViewingCurrent() ? 'none' : '';

  const banner = document.getElementById('pastDayBanner');
  const rpTitle = document.getElementById('rightPanelTitle');
  if (!isViewingCurrent()) {
    banner.textContent = 'Viewing ' + vd.label + ' (' + vd.date + ') \u2014 read-only';
    banner.classList.add('visible');
    rpTitle.textContent = vd.label + ' \u2014 Prepared Spells';
  } else {
    banner.classList.remove('visible');
    rpTitle.textContent = "Today\u2019s Prepared Spells";
  }
}

// ═══════════════════════════════════════════════════════════════
// NEW DAY
// ═══════════════════════════════════════════════════════════════

function promptNewDay() {
  document.getElementById('newDayModal').classList.add('open');
}
function closeNewDayModal() {
  document.getElementById('newDayModal').classList.remove('open');
}
function onNewDayModalBg(e) {
  if (e.target === document.getElementById('newDayModal')) closeNewDayModal();
}

function startNewDay(mode) {
  closeNewDayModal();
  const newId    = state.days.length + 1;
  const prepared = mode === 'copy'
    ? currentDay().prepared.map(p => ({ spellId: p.spellId, used: false, iid: uid() }))
    : [];
  state.days.push({ id: newId, label: 'Day ' + newId, date: today(), prepared });
  state.currentDayIndex = state.days.length - 1;
  autoSave();
  render();
}

// ═══════════════════════════════════════════════════════════════
// SPELL MANAGEMENT (add / edit / delete)
// ═══════════════════════════════════════════════════════════════

function openAddSpell(level) {
  spellModalEditId = null;
  document.getElementById('spellModalTitle').textContent = 'Add Spell';
  document.getElementById('modalLevel').value = level >= 0 ? level : 0;
  document.getElementById('modalName').value  = '';
  document.getElementById('modalDesc').value  = '';
  document.getElementById('spellModal').classList.add('open');
  setTimeout(() => document.getElementById('modalName').focus(), 50);
}

function openEditSpell(spellId) {
  const spell = findSpell(spellId);
  if (!spell) return;
  spellModalEditId = spellId;
  document.getElementById('spellModalTitle').textContent = 'Edit Spell';
  document.getElementById('modalLevel').value = spell.level;
  document.getElementById('modalName').value  = spell.name;
  document.getElementById('modalDesc').value  = spell.desc;
  document.getElementById('spellModal').classList.add('open');
  setTimeout(() => document.getElementById('modalName').focus(), 50);
}

function closeSpellModal() {
  document.getElementById('spellModal').classList.remove('open');
}
function onSpellModalBg(e) {
  if (e.target === document.getElementById('spellModal')) closeSpellModal();
}
function onSpellModalKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && e.target.tagName !== 'TEXTAREA') saveSpell();
  if (e.key === 'Escape') closeSpellModal();
}

function saveSpell() {
  const name  = document.getElementById('modalName').value.trim();
  const desc  = document.getElementById('modalDesc').value.trim();
  const level = parseInt(document.getElementById('modalLevel').value, 10);
  if (!name) { document.getElementById('modalName').focus(); return; }
  if (isNaN(level) || level < 0 || level > 9) return;

  if (spellModalEditId === null) {
    const newSpell = { id: nextSpellId(), level, name, desc };
    state.spells.push(newSpell);
    spellMap.set(newSpell.id, newSpell);
  } else {
    const spell = findSpell(spellModalEditId);
    if (spell) { spell.name = name; spell.desc = desc; spell.level = level; }
  }
  closeSpellModal();
  autoSave();
  renderLeft();
}

function deleteSpell(spellId) {
  const spell = findSpell(spellId);
  if (!spell) return;
  if (!confirm('Delete "' + spell.name + '"?\nIt will be removed from all days.')) return;
  for (const day of state.days) {
    day.prepared = day.prepared.filter(p => p.spellId !== spellId);
  }
  state.spells = state.spells.filter(s => s.id !== spellId);
  spellMap.delete(spellId);
  state.favorites.delete(spellId);
  autoSave();
  render();
}

// ═══════════════════════════════════════════════════════════════
// SPELL PREPARATION (current day only)
// ═══════════════════════════════════════════════════════════════

function preparedForLevel(level) {
  return viewingDay().prepared.filter(p => findSpell(p.spellId)?.level === level);
}
function isFull(level) {
  return currentDay().prepared.filter(p => findSpell(p.spellId)?.level === level).length >= slotMax(level);
}
function slotMax(level)   { return state.slots[level] ?? 0; }
function countOf(spellId) { return currentDay().prepared.filter(p => p.spellId === spellId).length; }

function addSpell(spellId) {
  if (!isViewingCurrent()) return;
  const spell = findSpell(spellId);
  if (!spell || isFull(spell.level)) return;
  const alreadyPrepared = countOf(spellId) > 0;
  cardAnims.set(spellId, alreadyPrepared ? 'anim-bounce' : 'anim-flip-in');
  currentDay().prepared.push({ spellId, used: false, iid: uid() });
  autoSave();
  render();
}

function removeInstance(iid) {
  if (!isViewingCurrent()) return;
  const inst = currentDay().prepared.find(p => p.iid === iid);
  if (inst && currentDay().prepared.filter(p => p.spellId === inst.spellId).length === 1) {
    cardAnims.set(inst.spellId, 'anim-flip-out');
  }
  currentDay().prepared = currentDay().prepared.filter(p => p.iid !== iid);
  autoSave();
  render();
}

function removeOneInstance(spellId) {
  if (!isViewingCurrent()) return;
  const prepared = currentDay().prepared;
  if (prepared.filter(p => p.spellId === spellId).length === 1) {
    cardAnims.set(spellId, 'anim-flip-out');
  }
  for (let i = prepared.length - 1; i >= 0; i--) {
    if (prepared[i].spellId === spellId) { prepared.splice(i, 1); break; }
  }
  autoSave();
  render();
}

function toggleUsed(iid) {
  if (!isViewingCurrent()) return;
  const p = currentDay().prepared.find(p => p.iid === iid);
  if (p) { p.used = !p.used; autoSave(); render(); }
}

function toggleFav(spellId) {
  if (state.favorites.has(spellId)) state.favorites.delete(spellId);
  else state.favorites.add(spellId);
  autoSave();
  renderLeft();
}

// ═══════════════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════════════

function openSettings() {
  const form = document.getElementById('slotForm');
  form.innerHTML = '';
  for (let i = 0; i <= 9; i++) {
    const row = document.createElement('div');
    row.className = 'slot-row';
    row.innerHTML = `<label for="s${i}">${LEVEL_NAMES[i]}</label>
      <input type="number" id="s${i}" min="0" max="30" value="${state.slots[i] ?? 0}">`;
    form.appendChild(row);
  }
  document.getElementById('overlay').classList.add('open');
}
function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
function onOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }

function saveSettings() {
  const newSlots = {};
  for (let i = 0; i <= 9; i++) {
    const v = parseInt(document.getElementById('s' + i).value, 10);
    newSlots[i] = isNaN(v) ? 0 : Math.max(0, v);
  }

  // Dry-run: count how many prepared spells would be removed
  const tally = {};
  for (let i = 0; i <= 9; i++) tally[i] = 0;
  let wouldLose = 0;
  for (const p of currentDay().prepared) {
    const lvl = findSpell(p.spellId)?.level ?? -1;
    if (lvl < 0) { wouldLose++; continue; }
    if (tally[lvl] < newSlots[lvl]) { tally[lvl]++; }
    else { wouldLose++; }
  }

  if (wouldLose > 0) {
    const ok = confirm(
      `Reducing slots will remove ${wouldLose} prepared spell${wouldLose === 1 ? '' : 's'} from today.\n\nContinue?`
    );
    if (!ok) return;
  }

  state.slots = newSlots;
  const tally2 = {};
  for (let i = 0; i <= 9; i++) tally2[i] = 0;
  currentDay().prepared = currentDay().prepared.filter(p => {
    const lvl = findSpell(p.spellId)?.level ?? -1;
    if (lvl < 0) return false;
    if (tally2[lvl] < state.slots[lvl]) { tally2[lvl]++; return true; }
    return false;
  });
  autoSave();
  closeSettings();
  render();
}

// ═══════════════════════════════════════════════════════════════
// RENDER — LEFT PANEL
// ═══════════════════════════════════════════════════════════════

let searchTimer     = 0;
let favFilterActive = false;

function scheduleRenderLeft() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => renderLeft(), 150);
}

function onSearchInput() {
  const hasText = document.getElementById('searchInput').value.length > 0;
  document.getElementById('searchClearBtn').style.display = hasText ? '' : 'none';
  scheduleRenderLeft();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClearBtn').style.display = 'none';
  scheduleRenderLeft();
  document.getElementById('searchInput').focus();
}

function toggleFavFilter() {
  favFilterActive = !favFilterActive;
  const btn = document.getElementById('favFilterBtn');
  btn.classList.toggle('fav-active', favFilterActive);
  scheduleRenderLeft();
}

function renderLeft(maps) {
  if (!maps) maps = buildPrepMaps();
  const panel = document.getElementById('leftPanel');
  const q     = document.getElementById('searchInput').value.trim().toLowerCase();
  const frag  = document.createDocumentFragment();

  const isCurrent = isViewingCurrent();

  for (let lvl = 0; lvl <= 9; lvl++) {
    let spells = state.spells.filter(s => s.level === lvl);
    if (q) spells = spells.filter(s => s.name.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q));
    if (favFilterActive) spells = spells.filter(s => state.favorites.has(s.id));

    const max = slotMax(lvl);
    if (!q && !favFilterActive && spells.length === 0 && max === 0) continue;
    if ((q || favFilterActive) && spells.length === 0) continue;

    spells.sort((a, b) => {
      const af = state.favorites.has(a.id) ? 0 : 1;
      const bf = state.favorites.has(b.id) ? 0 : 1;
      return af - bf || a.name.localeCompare(b.name);
    });

    const prepCount = (maps.prepByLevel.get(lvl) || []).length;
    const full      = isCurrent && prepCount >= max && max > 0;

    let ctrClass = '';
    if (prepCount > 0 && prepCount < max) ctrClass = 'has-prepared';
    if (full)                             ctrClass = 'slot-full';
    if (isCurrent && prepCount === max && max > 0) ctrClass = 'slot-complete';

    const isCollapsed = state.collapsed.has(lvl);
    const section     = document.createElement('div');
    section.className = 'level-section' + (isCollapsed ? ' collapsed' : '');

    const hdr = document.createElement('div');
    hdr.className = 'level-header';
    hdr.dataset.level = lvl;
    hdr.innerHTML = `
      <span class="level-name">${LEVEL_NAMES[lvl]}</span>
      <span class="slot-counter ${ctrClass}">${prepCount}&thinsp;/&thinsp;${max}${ctrClass === 'slot-complete' ? '&thinsp;&#10003;' : ''}</span>
      <span class="caret">&#9660;</span>`;
    const grid = document.createElement('div');
    grid.className = 'spells-grid';

    for (const spell of spells) {
      const cnt      = isCurrent ? (maps.countBySpellId.get(spell.id) || 0) : 0;
      const isFav    = state.favorites.has(spell.id);
      const slotFull = isCurrent && full && cnt === 0;

      const card = document.createElement('div');
      card.className = 'spell-card' +
        (cnt > 0    ? ' is-prepared'    : '') +
        (slotFull   ? ' slot-full-card' : '');
      card.dataset.level   = lvl;
      card.dataset.spellId = spell.id;
      card.title = slotFull
        ? 'No spell slots remaining for this level'
        : isCurrent ? `Click to prepare ${spell.name}${cnt > 0 ? ' (again)' : ''}` : '';

      card.innerHTML = `
        <div class="card-actions">
          <button class="btn-card-action btn-card-edit"   title="Edit spell">&#9998;</button>
          <button class="btn-card-action btn-card-delete" title="Delete spell">&#10005;</button>
        </div>
        <div class="spell-card-name">${highlightMatch(spell.name, q)}</div>
        <div class="spell-card-desc">${escHtml(spell.desc)}</div>
        <div class="card-badges">
          <span class="badge-fav${isFav ? ' fav-active' : ''}" title="${isFav ? 'Remove from favorites' : 'Add to favorites'}">&#9733;</span>
          <span class="badge-count" style="${cnt > 0 ? '' : 'visibility:hidden'}">${cnt || 1}</span>
          <button class="btn-badge-remove" style="${cnt > 0 ? '' : 'visibility:hidden'}" title="Remove one prepared">&#10005;</button>
        </div>`;

      grid.appendChild(card);

      if (cardAnims.has(spell.id)) {
        const cls = cardAnims.get(spell.id);
        cardAnims.delete(spell.id);
        requestAnimationFrame(() => {
          card.classList.add(cls);
          card.addEventListener('animationend', () => card.classList.remove(cls), { once: true });
        });
      }
    }

    // "+ Add Spell" row at bottom of each level section
    const addRow = document.createElement('div');
    addRow.className = 'add-spell-row';
    const addBtn = document.createElement('button');
    addBtn.className   = 'btn-add-spell';
    addBtn.dataset.level = lvl;
    addBtn.textContent = '+ Add Spell at this level';
    addRow.appendChild(addBtn);

    section.appendChild(hdr);
    section.appendChild(grid);
    section.appendChild(addRow);
    frag.appendChild(section);
  }

  if (frag.children.length === 0) {
    const msg = document.createElement('p');
    msg.className = 'empty-msg';
    msg.innerHTML = q
      ? 'No spells match your search.'
      : favFilterActive
        ? 'No favorited spells yet.<br>Star a spell to add it to favorites.'
        : 'No spells yet.<br>Use &ldquo;+ Add Spell&rdquo; to get started.';
    frag.appendChild(msg);
  }
  panel.replaceChildren(frag);
}

// ═══════════════════════════════════════════════════════════════
// RENDER — RIGHT PANEL
// ═══════════════════════════════════════════════════════════════

function renderRight(maps) {
  const panel    = document.getElementById('rightPanel');
  const readOnly = !isViewingCurrent();
  const frag     = document.createDocumentFragment();
  let hasAny     = false;
  let totalCount = 0;

  for (let lvl = 0; lvl <= 9; lvl++) {
    const instances = maps.prepByLevel.get(lvl) || [];
    if (instances.length === 0) continue;
    hasAny      = true;
    totalCount += instances.length;

    const max    = slotMax(lvl);
    const block  = document.createElement('div');
    block.className = 'prep-level-block';

    const lhdr = document.createElement('div');
    lhdr.className = 'prep-level-header';
    let badgeClass = '';
    if (instances.length === max && max > 0) badgeClass = 'complete';
    if (instances.length > max)              badgeClass = 'full';
    lhdr.innerHTML = `
      <span class="prep-level-name">${LEVEL_NAMES[lvl]}</span>
      <span class="prep-slot-badge ${badgeClass}">${instances.length}&thinsp;/&thinsp;${max}</span>`;
    block.appendChild(lhdr);

    for (const inst of instances) {
      const spell = findSpell(inst.spellId);
      if (!spell) continue;

      const item = document.createElement('div');
      item.className = 'prep-item' +
        (inst.used ? ' is-used' : '') +
        (readOnly  ? ' read-only' : '');
      item.dataset.spellId = spell.id;
      item.dataset.iid     = inst.iid;

      item.innerHTML = `
        <span class="prep-item-name">${escHtml(spell.name)}</span>
        <span class="prep-item-status">${inst.used ? '&#10003;' : '&ndash;'}</span>
        <div class="prep-item-controls">
          <button class="btn-micro use-btn${inst.used ? ' active' : ''}"
                  title="${inst.used ? 'Mark as uncast' : 'Mark as cast'}">&#10003;</button>
          <button class="btn-micro remove-btn" title="Remove from prepared">&#10005;</button>
        </div>`;

      block.appendChild(item);
    }

    frag.appendChild(block);
  }

  if (!hasAny) {
    const msg = document.createElement('p');
    msg.className = 'empty-msg';
    msg.innerHTML = readOnly
      ? 'No spells were prepared on this day.'
      : 'No spells prepared yet.<br>Click spells on the left to prepare them.';
    frag.appendChild(msg);
  }
  panel.replaceChildren(frag);
  const summary = document.getElementById('prepSummary');
  if (summary) summary.textContent = totalCount > 0 ? totalCount + ' prepared' : '';
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════

const ESC_MAP = { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' };
function escHtml(str) {
  return str.replace(/[&<>"]/g, c => ESC_MAP[c]);
}

function highlightMatch(text, q) {
  if (!q) return escHtml(text);
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx))
    + '<mark class="search-hl">' + escHtml(text.slice(idx, idx + q.length)) + '</mark>'
    + escHtml(text.slice(idx + q.length));
}

// ═══════════════════════════════════════════════════════════════
// RENDER (combined)
// ═══════════════════════════════════════════════════════════════

function buildPrepMaps() {
  const day = viewingDay();
  const countBySpellId = new Map();
  const prepByLevel    = new Map();
  for (const p of day.prepared) {
    countBySpellId.set(p.spellId, (countBySpellId.get(p.spellId) || 0) + 1);
    const spell = findSpell(p.spellId);
    if (spell) {
      const lvl = spell.level;
      if (!prepByLevel.has(lvl)) prepByLevel.set(lvl, []);
      prepByLevel.get(lvl).push(p);
    }
  }
  return { countBySpellId, prepByLevel };
}

function render() {
  updateDayNav();
  const maps = buildPrepMaps();
  renderLeft(maps);
  renderRight(maps);
}
// ═══════════════════════════════════════════════════════════════
// DIVIDER DRAG
// ═══════════════════════════════════════════════════════════════

(function() {
  const divider  = document.getElementById('divider');
  const panelLeft = document.querySelector('.panel-left');
  const main      = document.querySelector('.main');
  let dragging = false;

  divider.addEventListener('mousedown', e => {
    dragging = true;
    divider.classList.add('dragging');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  let dragRAF = 0;
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    if (dragRAF) return;
    dragRAF = requestAnimationFrame(() => {
      dragRAF = 0;
      const rect = main.getBoundingClientRect();
      const w = Math.max(180, Math.min(e.clientX - rect.left, rect.width - 180));
      panelLeft.style.width = w + 'px';
    });
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    divider.classList.remove('dragging');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
  });
})();

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

function mergeDefaultSpells() {
  let changed = false;
  for (const s of DEFAULT_SPELLS) {
    if (!spellMap.has(s.id)) {
      const copy = { ...s };
      state.spells.push(copy);
      spellMap.set(copy.id, copy);
      changed = true;
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// SPELL TOOLTIP (prepared list hover)
// ═══════════════════════════════════════════════════════════════

(function initTooltip() {
  const tip     = document.getElementById('spellTooltip');
  const tipDesc = tip.querySelector('.tooltip-desc');
  let activeId = null;
  const OFFSET_X = 18, OFFSET_Y = 12;

  let cachedTW = 300, cachedTH = 140;
  function cacheTipSize() {
    cachedTW = tip.offsetWidth  || 300;
    cachedTH = tip.offsetHeight || 140;
  }
  function moveTip(mx, my) {
    let x = mx + OFFSET_X;
    let y = my + OFFSET_Y;
    if (x + cachedTW > window.innerWidth  - 8) x = mx - cachedTW - OFFSET_X;
    if (y + cachedTH > window.innerHeight - 8) y = my - cachedTH - OFFSET_Y;
    if (x < 8) x = 8;
    if (y < 8) y = 8;
    tip.style.left = x + 'px';
    tip.style.top  = y + 'px';
  }

  function hide() {
    activeId = null;
    tip.classList.remove('visible');
  }

  const rightPanel = document.getElementById('rightPanel');

  let tipRAF = 0;
  document.addEventListener('mousemove', e => {
    const item = e.target.closest('.prep-item[data-spell-id]');
    const id   = item ? +item.dataset.spellId : null;

    if (id !== activeId) {
      if (id === null) {
        hide();
      } else {
        const spell = findSpell(id);
        if (spell) {
          activeId = id;
          tipDesc.textContent = spell.desc;
          tip.classList.add('visible');
          requestAnimationFrame(cacheTipSize);
        }
      }
    }

    if (activeId !== null && !tipRAF) {
      const mx = e.clientX, my = e.clientY;
      tipRAF = requestAnimationFrame(() => { tipRAF = 0; moveTip(mx, my); });
    }
  }, { passive: true });

  rightPanel.addEventListener('mouseleave', () => hide());
  rightPanel.addEventListener('scroll',     () => hide(), { passive: true });
})();

// ═══════════════════════════════════════════════════════════════
// EVENT DELEGATION — RIGHT PANEL
// ═══════════════════════════════════════════════════════════════

document.getElementById('rightPanel').addEventListener('click', e => {
  if (!isViewingCurrent()) return;
  const item = e.target.closest('.prep-item[data-iid]');
  if (!item) return;
  const iid = item.dataset.iid;
  if (e.target.closest('.use-btn'))    { toggleUsed(iid); return; }
  if (e.target.closest('.remove-btn')) { removeInstance(iid); return; }
});

// ═══════════════════════════════════════════════════════════════
// EVENT DELEGATION — LEFT PANEL
// ═══════════════════════════════════════════════════════════════

document.getElementById('leftPanel').addEventListener('click', e => {
  const badge = e.target.closest('.badge-fav');
  if (badge) {
    e.stopPropagation();
    const card = badge.closest('.spell-card[data-spell-id]');
    if (card) toggleFav(+card.dataset.spellId);
    return;
  }
  const editBtn = e.target.closest('.btn-card-edit');
  if (editBtn) {
    e.stopPropagation();
    const card = editBtn.closest('.spell-card[data-spell-id]');
    if (card) openEditSpell(+card.dataset.spellId);
    return;
  }
  const delBtn = e.target.closest('.btn-card-delete');
  if (delBtn) {
    e.stopPropagation();
    const card = delBtn.closest('.spell-card[data-spell-id]');
    if (card) deleteSpell(+card.dataset.spellId);
    return;
  }
  const removeBtn = e.target.closest('.btn-badge-remove');
  if (removeBtn) {
    e.stopPropagation();
    const card = removeBtn.closest('.spell-card[data-spell-id]');
    if (card) removeOneInstance(+card.dataset.spellId);
    return;
  }
  const addBtn = e.target.closest('.btn-add-spell[data-level]');
  if (addBtn) {
    openAddSpell(+addBtn.dataset.level);
    return;
  }
  const hdr = e.target.closest('.level-header[data-level]');
  if (hdr) {
    const lvl = +hdr.dataset.level;
    if (state.collapsed.has(lvl)) state.collapsed.delete(lvl);
    else state.collapsed.add(lvl);
    autoSave(); renderLeft();
    return;
  }
  const card = e.target.closest('.spell-card[data-spell-id]');
  if (card && isViewingCurrent() && !card.classList.contains('slot-full-card')) {
    addSpell(+card.dataset.spellId);
  }
});

// ═══════════════════════════════════════════════════════════════
// CLICK BURST
// ═══════════════════════════════════════════════════════════════

document.addEventListener('mousedown', e => {
  const btn = e.target.closest(
    '.btn, .day-nav-btn, .btn-add-global, .btn-micro, .btn-add-spell, .btn-card-action'
  );
  if (!btn || btn.disabled) return;
  btn.classList.remove('click-burst');
  void btn.offsetWidth;
  btn.classList.add('click-burst');
  btn.addEventListener('animationend', () => btn.classList.remove('click-burst'), { once: true });
});

document.addEventListener('visibilitychange', () => {
  document.body.classList.toggle('page-hidden', document.hidden);
});

function init() {
  const saved = localStorage.getItem('dnd-cleric-state');
  if (saved) {
    try { restoreState(JSON.parse(saved)); }
    catch(e) { initFreshState(); }
  } else {
    initFreshState();
  }
  mergeDefaultSpells();
  updateFileStatus();
  render();
}

init();
</script>
